# Render.com blueprint — provisions the database, backend and frontend.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy, seed the database once from the backend service
# shell:  node dist/prisma/seed.js
# and make sure the frontend VITE_API_URL matches the backend URL.

databases:
  - name: gscores-db
    databaseName: gscores
    user: gscores
    plan: free

services:
  # ----- Backend (Docker) -----
  - type: web
    name: gscores-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gscores-db
          property: connectionString
      # Render injects PORT automatically; the server honours it.

  # ----- Frontend (static site built with Vite) -----
  - type: web
    name: gscores-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      # Update this to the backend's public URL after the first deploy.
      - key: VITE_API_URL
        value: https://gscores-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
